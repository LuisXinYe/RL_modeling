name: "Llama-3.1-8B (8x 910C)"
description: "Llama 3.1 8B on 8x Ascend 910C — single-node"
model: "Llama-3.1-8B"
hardware: "Ascend 910C"
network: "HCCS+RoCE (910C)"
total_devices: 8

parallelism:
  tp: 4
  pp: 2
  ep: 1
  dp: 1
  cp: 1
  cp_type: ring
  sp: false
  zero_stage: 0
  pp_schedule: "1f1b"
  recompute_attention: false
  full_recomputation: false
  optimizer_offload: false
  activation_offload: false
gen_parallelism:
  tp: 4
  pp: 1
  ep: 1
  dp: 2
  cp: 1
  cp_type: ring
ref_parallelism:
  tp: 4
  pp: 1
  ep: 1
  dp: 2
  cp: 1

rl:
  group_size: 8
  avg_prompt_len: 512
  avg_response_len: 2048
  max_response_len: 4096
  train_micro_batch_size: 4
  train_batch_size: 36
  gradient_accumulation_steps: 1
  gen_batch_size: 64
  reference_model: true
  ref_offload_cpu: false
  use_speculative_decoding: false

inference:
  batch_size: 64
  avg_prompt_len: 512
  avg_response_len: 2048
  max_response_len: 4096
  std_response_len: null
  use_speculative_decoding: false

train:
  avg_seq_len: 4096
  train_micro_batch_size: 4
  train_batch_size: 36
  gradient_accumulation_steps: 1