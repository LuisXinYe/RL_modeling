name: "Ascend 910B"
# 25 AI Cores @ 1850 MHz, 50 AIV Cores @ 1850 MHz
# Peak BF16: 313 TFLOPS (vendor spec, CUBE unit)
# HBM: 64 GB HBM2e, ~1.2 TB/s bandwidth
# Interconnect: HCCS intra-node, RoCE v2 inter-node
#
# Calibration based on Pangu-74B-VL RL training profile (06_comprehensive_report.md):
# - Training MFU: 8-12% (communication-bound due to PP=8 + MoE EP=8)
# - Ref MFU: 3-5% (pure forward, PP broadcast overhead)
# - Communication accounts for 67.8% of training time
peak_tflops_bf16: 300
hbm_capacity_gb: 64
hbm_bandwidth_tb_s: 1.2
hbm_usable_ratio: 0.85
cpu_gpu_bw_gb_s: 32
calibration:
  # Based on实测 MFU ~10%, lowered from theoretical 0.45
  #compute_eff_large_gemm: 0.10
  #compute_eff_small_op: 0.08
  compute_eff_large_gemm: 0.45
  compute_eff_small_op: 0.20
  memory_efficiency: 0.50
  # Communication efficiency lowered due to PP bubble + MoE alltoAll contention
  comm_efficiency: 0.40
