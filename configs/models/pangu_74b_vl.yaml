name: "Pangu-74B-VL"
description: "Pangu-74B-VL multimodal MoE on 128x Ascend 910B — 3-phase parallelism with vision encoder and MTP"
model:
  name: "Pangu-74B-VL"
  hidden_size: 4608
  vocab_size: 153600
  num_layers: 51
  dtype: bf16
  layer:
    attention: GQA
    num_heads: 64
    num_kv_heads: 4
    head_dim: 128
    ffn: MoE
    num_experts: 80
    num_shared_experts: 1
    top_k: 8
    expert_intermediate_size: 1280
    shared_intermediate_size: 2560
    intermediate_size: 10240
    residual: standard
  vision_encoder:
    hidden_size: 1536
    num_layers: 26
    num_heads: 16
    ffn: SwiGLU
    intermediate_size: 4608
    anyres_max_pixels: 1806336
    patch_size: 14
    temporal_patch_size: 2
    merge_size: 2
    mm_vision_token_down_size: 2
  auxiliary:
    mtp_depth: 1
  layers_summary: "4x GQA+SwiGLU, 47x GQA+MoE E80"
hardware: "Ascend 910B"
total_devices: 128
parallelism:
  tp: 4
  pp: 8
  ep: 2
  dp: 1
  cp: 4
  cp_type: ring
  sp: true
  zero_stage: 0
  pp_schedule: "1f1b"
  recompute_attention: true
  full_recomputation: true
  optimizer_offload: true
  activation_offload: false
  param_offload: true
  grad_offload: true
gen_parallelism:
  tp: 4
  pp: 1
  ep: 8
  dp: 2
ref_parallelism:
  tp: 1
  pp: 1
  ep: 1
  dp: 128
rl:
  algorithm: grpo
  reward_model: false
  group_size: 16
  avg_prompt_len: 2048
  avg_response_len: 8192
  max_response_len: 24576
  std_response_len: 2048
  train_micro_batch_size: 1
  gradient_accumulation_steps: 1
  train_batch_size: 36
  gen_batch_size: 18
  colocated: true
  reference_model: true
  ref_offload_cpu: true
  use_speculative_decoding: true
  mtp_acceptance_len: 1
